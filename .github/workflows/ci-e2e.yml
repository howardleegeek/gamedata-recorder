name: E2E CI (run_ci.ps1)

# Runs the teammate's end-to-end test harness on a GitHub Actions
# windows-latest runner (free compute, has cargo + MSVC + Python +
# ffmpeg pre-installed). Drives the recorder via GAMEDATA_CI_MODE=1
# against the synthetic test_game D3D window and validates the MP4.
#
# Why not run on nucbox directly:
# - OpenSSH session on nucbox runs as filtered UAC token; can't elevate
#   to install VS Build Tools / MSVC without interactive UAC prompt.
# - windows-latest runner has everything pre-installed and elevation
#   isn't an issue (the runner IS admin on its own VM).
#
# KNOWN LIMITATION: windows-latest runners have NO real GPU / OpenGL.
# Empirically (iter 7, 2026-04-20):
#   - OBS init fails with RuntimeChannelError — libobs can't create
#     a working D3D device on the runner's software adapter
#   - egui_overlay panics with "WGL: The driver does not appear to
#     support OpenGL" — egui_overlay is built with glfw + OpenGL
# Net: the recorder CANNOT execute a real recording on a GH runner;
# the workflow can only verify compile + deps wiring.
#
# For a real end-to-end smoke test, run run_ci.ps1 locally on any
# Windows machine with a GPU (nucbox, a dev laptop, a teammate's box).
# See docs/NUCBOX_SETUP_SOP.md for the bring-up steps.
#
# Set to workflow_dispatch ONLY so every push doesn't red this run.

on:
  workflow_dispatch:
    inputs:
      record_seconds:
        description: 'Seconds to record'
        required: false
        default: '5'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Bypass consent gate, game-whitelist, and use $GAMEDATA_OUTPUT_DIR
  # instead of %LocalAppData%. See `feat(ci): GAMEDATA_CI_MODE`.
  GAMEDATA_CI_MODE: '1'

jobs:
  e2e:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install ffmpeg (provides ffprobe for check_video.py)
        # windows-latest runners do NOT ship ffmpeg pre-installed.
        # Chocolatey is pre-installed and fast for this.
        run: choco install -y ffmpeg --no-progress
        shell: pwsh

      - name: Verify Python + ffprobe present
        run: |
          python --version
          ffprobe -version | Select-Object -First 1
        shell: pwsh

      - name: Install cargo-obs-build
        run: cargo install cargo-obs-build
        shell: pwsh

      - name: Pre-stage OBS runtime next to the recorder binary
        # The recorder needs libobs DLLs + data folder next to the
        # .exe at runtime. `.cargo/config.toml` pins the triple so
        # the exe lands under target\x86_64-pc-windows-msvc\release\.
        run: |
          $outDir = "target\x86_64-pc-windows-msvc\release"
          New-Item -ItemType Directory -Force -Path $outDir
          cargo obs-build build --out-dir $outDir
        shell: pwsh

      - name: Run E2E pipeline
        # Pass workflow input via env (safe from injection).
        env:
          RECORD_SECONDS_RAW: ${{ inputs.record_seconds }}
        run: |
          $raw = if ([string]::IsNullOrWhiteSpace($env:RECORD_SECONDS_RAW)) { '5' } else { $env:RECORD_SECONDS_RAW }
          $seconds = [int]$raw
          Write-Host "Running run_ci.ps1 with -RecordSeconds $seconds"
          .\run_ci.ps1 -RecordSeconds $seconds -SkipCommit
        shell: pwsh

      - name: Upload recorded MP4 + logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-output-${{ github.run_id }}
          path: |
            ci_output/*.mp4
            target/x86_64-pc-windows-msvc/release/*.log
            target/release/*.log
          retention-days: 14
          if-no-files-found: warn
