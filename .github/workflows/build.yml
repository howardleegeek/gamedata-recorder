name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-cargo-registry-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: windows-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            windows-target-${{ hashFiles('**/Cargo.lock') }}-
            windows-target-

      - name: Install cargo-obs-build
        run: cargo install cargo-obs-build

      - name: Install OBS binaries
        run: cargo obs-build build --out-dir target\x86_64-pc-windows-msvc\debug

      - name: Build debug (check compilation)
        run: cargo build
        continue-on-error: true

      - name: Install OBS binaries (release)
        if: success()
        run: cargo obs-build build --out-dir target\x86_64-pc-windows-msvc\release

      - name: Build release
        if: success()
        run: cargo build --release
        continue-on-error: true

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gamedata-recorder-windows
          path: |
            target/release/gamedata-recorder.exe
            target/x86_64-pc-windows-msvc/release/*.dll
          if-no-files-found: warn
