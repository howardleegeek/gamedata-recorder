name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check Rust formatting
        run: cargo fmt -- --check

      - name: Build Rust application (release)
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Create dist directory
        run: New-Item -ItemType Directory -Force -Path dist

      - name: Install and run cargo-obs-build
        run: |
          cargo install cargo-obs-build
          cargo obs-build build --out-dir dist\

      - name: Clean unnecessary OBS files
        run: .\build-resources\scripts\clean_obs_build.ps1

      - name: Copy Rust binary
        run: |
          $bin = "target\x86_64-pc-windows-msvc\release\gamedata-recorder.exe"
          if (-not (Test-Path $bin)) {
            $bin = Get-ChildItem "target\x86_64-pc-windows-msvc\release\*.exe" -File | Where-Object { $_.Name -ne "obs-ffmpeg-mux.exe" } | Select-Object -First 1 -ExpandProperty FullName
          }
          Copy-Item $bin "dist\gamedata-recorder.exe"

      - name: Copy OBS FFmpeg mux helper
        run: |
          $mux = "target\x86_64-pc-windows-msvc\release\obs-ffmpeg-mux.exe"
          if (Test-Path $mux) {
            Copy-Item $mux "dist\obs-ffmpeg-mux.exe"
          }

      - name: Copy assets
        run: |
          if (Test-Path assets) { Copy-Item -Path assets -Destination dist\assets -Recurse }
          if (Test-Path README.md) { Copy-Item README.md dist\README.md }
          if (Test-Path LICENSE) { Copy-Item LICENSE dist\LICENSE }

      - name: Verify dist contents
        run: |
          Write-Host "=== dist/ contents ==="
          Get-ChildItem -Path dist -Recurse | Format-Table Name, Length
          if (-not (Test-Path "dist\gamedata-recorder.exe")) { throw "gamedata-recorder.exe missing!" }

      - name: Create portable zip
        run: |
          $currentDir = Get-Location
          Set-Location dist
          Compress-Archive -Path ".\*" -DestinationPath "..\gamedata-recorder-windows-x64.zip" -Force
          Set-Location $currentDir

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: gamedata-recorder-windows-x64
          path: gamedata-recorder-windows-x64.zip
          retention-days: 30

      - name: Upload dist folder
        uses: actions/upload-artifact@v4
        with:
          name: gamedata-recorder-dist
          path: dist/
          retention-days: 30

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: gamedata-recorder-windows-x64
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/gamedata-recorder-windows-x64.zip
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
