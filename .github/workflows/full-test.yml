name: Full System Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # 每天凌晨3点自动运行测试
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ==========================================
  # Job 1: Rust 代码检查 (Windows only - 项目需要 Windows API)
  # ==========================================
  test-rust-build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings
        continue-on-error: true

      - name: Run tests
        run: cargo test --lib
        continue-on-error: true

      - name: Check compilation
        run: cargo check

  # ==========================================
  # Job 2: 安全扫描
  # ==========================================
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "=== Scanning for hardcoded secrets ==="
          
          # 检查 Rust 代码中的潜在密钥
          if grep -r "password.*=.*\"" ./src --include="*.rs" 2>/dev/null | grep -v "example\|test\|dummy" | head -5; then
            echo "⚠️ Found potential hardcoded passwords in Rust code"
          fi
          
          if grep -r "secret.*=.*\"" ./src --include="*.rs" 2>/dev/null | grep -v "example\|test\|dummy\|env::var" | head -5; then
            echo "⚠️ Found potential hardcoded secrets in Rust code"
          fi
          
          if grep -r "api_key.*=.*\"" ./src --include="*.rs" 2>/dev/null | grep -v "example\|test\|dummy" | head -5; then
            echo "⚠️ Found potential hardcoded API keys in Rust code"
          fi
          
          echo "✅ Secret scan completed"

  # ==========================================
  # 最终状态报告
  # ==========================================
  test-summary:
    runs-on: ubuntu-latest
    needs: [test-rust-build, security-scan]
    if: always()
    
    steps:
      - name: Test Summary
        run: |
          echo "=========================================="
          echo "    GameData Recorder Test Summary"
          echo "=========================================="
          echo ""
          echo "Rust Build Tests:     ${{ needs.test-rust-build.result }}"
          echo "Security Scan:        ${{ needs.security-scan.result }}"
          echo ""
          echo "=========================================="
          
          # 检查关键测试是否通过
          if [[ "${{ needs.test-rust-build.result }}" == "failure" ]]; then
            echo "❌ Rust build tests failed!"
            exit 1
          else
            echo "✅ All critical tests passed!"
          fi
